<section id="project" class="section">
    <div class="text-section tracking-[0.16em] uppercase mb-6"># 0{{ section_index }} — projects</div>

    <div class="flex flex-wrap gap-5">
        {% for project in resume.projects.all %}
            <div class="slide-panel project-card mb-3 w-full md:w-[30%]" data-id="projects/{{ project.id }}">
                <div class="flex flex-col border rounded p-4 group cursor-pointer bg-white">
                    <div class="tracking-wide font-bold text-xl mb-3">{{ project.title }}</div>
                    <div class="text-sm text-muted leading-[1.75] mb-3">{{ project.introduction }}</div>
                    <div class="flex flex-wrap gap-1.5 mb-3">
                        {% for skill in project.skills.all %}
                            <span class="cstag">{{ skill.name }}</span>
                        {% endfor %}
                    </div>
                    <div class="text-border tracking-wide transition-colors group-hover:text-accent text-[0.8rem]">
                        자세히 보기 →
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</section>
