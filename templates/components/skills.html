<section id="project" class="section">
    <div class="text-section tracking-[0.16em] uppercase mb-5"># 보유 기술</div>

    <div class="flex flex-col gap-10" id="skills-list">
        <!-- Languages -->
        <div class="flex flex-wrap gap-3">
            {% for skill in resume.skills.all %}
                <span class="slide-panel text-accent border border-accent-border px-3 py-1 rounded-[0.5rem] tracking-wide cursor-pointer hover:bg-[#efefef]"
                      data-id="skills/{{ skill.id }}">
                {{ skill.name }}
                </span>
            {% endfor %}

        </div>
    </div>
</section>
